name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm test -- --run

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx tsc --noEmit

  rust-check:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Get Rust version
        id: rust-version
        shell: bash
        run: echo "hash=$(rustc --version | sha256sum | cut -d' ' -f1)" >> $GITHUB_OUTPUT
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ steps.rust-version.outputs.hash }}-${{ hashFiles('src-tauri/Cargo.lock') }}
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Debug Cargo.lock
        working-directory: src-tauri
        shell: bash
        run: |
          echo "=== webview2-com entries in Cargo.lock ==="
          grep -c 'name = "webview2-com"' Cargo.lock
          grep -A3 'name = "webview2-com"' Cargo.lock
          echo "=== windows-core entries in Cargo.lock ==="
          grep -c 'name = "windows-core"' Cargo.lock
          grep -A3 'name = "windows-core"' Cargo.lock
          echo "=== wry entry ==="
          grep -A40 'name = "wry"' Cargo.lock | head -45
          echo "=== cargo tree for webview2-com ==="
          cargo tree -p webview2-com --locked 2>&1 || true
          echo "=== cargo tree duplicates ==="
          cargo tree -d --locked 2>&1 | grep -i "webview2\|windows-core\|windows-string" || true
      - name: Cargo check
        working-directory: src-tauri
        run: cargo check --locked
